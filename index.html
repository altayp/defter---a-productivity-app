<!DOCTYPE html>
<html data-theme="dark" data-color="green">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Defter</title>
  <link rel="stylesheet" href="css/base.css"/>
  <link rel="stylesheet" href="css/layout.css"/>
  <link rel="stylesheet" href="css/welcome.css"/>
  <link rel="stylesheet" href="css/modules/test.css"/>
  <link rel="stylesheet" href="css/modules/pomodoro.css"/>
  <link rel="stylesheet" href="css/modules/settings.css"/>
  <link rel="stylesheet" href="css/modules/todo.css"/>
  <link rel="stylesheet" href="css/modules/datepicker.css"/>
  <link rel="stylesheet" href="css/modules/projects.css"/>
  <link rel="stylesheet" href="css/modules/calendar.css"/>
  <link rel="stylesheet" href="css/modules/today.css"/>
  <link rel="stylesheet" href="css/modules/notes.css"/>
  <link rel="stylesheet" href="css/modules/focus.css"/>
  <link rel="stylesheet" href="css/modules/habits.css"/>
</head>
<body>

<div id="app">

  <!-- Üst Bar -->
  <header id="titlebar">
    <div id="titlebar-left">
      <span id="app-logo">&#x2711;</span>
      <span id="app-name">Defter</span>
    </div>

    <div id="titlebar-center">
      <button class="color-dot" data-color="green"  title="Yeşil"></button>
      <button class="color-dot" data-color="blue"   title="Mavi"></button>
      <button class="color-dot" data-color="red"    title="Kırmızı"></button>
      <button class="color-dot" data-color="purple" title="Mor"></button>
      <button class="color-dot" data-color="gold"   title="Altın"></button>
      <button class="color-dot color-dot-custom" data-color="custom" title="Özel Renk" id="color-dot-custom"></button>
      <span class="titlebar-center-sep"></span>
      <button class="focus-eye" id="focus-mode-btn" title="Odaklan (sütunları gizle)"></button>
    </div>

    <div id="titlebar-right">
      <button class="titlebar-btn" id="layout-lock-btn" title="Düzeni Kilitle / Aç"></button>
      <button class="titlebar-btn" id="theme-toggle" title="Tema Değiştir"></button>
      <button class="titlebar-btn" id="settings-btn" title="Ayarlar" data-icon="settings" data-icon-size="15"></button>
      <span class="titlebar-sep">|</span>
      <button class="titlebar-btn" id="btn-min"   title="Küçült">&#x2500;</button>
      <button class="titlebar-btn" id="btn-max"   title="Büyüt">&#x25A1;</button>
      <button class="titlebar-btn danger" id="btn-close" title="Kapat">&#x2715;</button>
    </div>
  </header>

  <!-- Ana İçerik -->
  <div id="main">

    <!-- Sol Sütun -->
    <aside class="column" id="col-left">

      <div class="widget" id="widget-today" data-col="left">
        <div class="widget-header">
          <span class="widget-drag-handle" title="Taşı"></span>
          <span class="widget-icon" data-icon="today" data-icon-size="15"></span>
          <span class="widget-title">Bugün</span>
          <button class="widget-expand" id="today-expand-btn" data-icon="expand" data-icon-size="13"></button>
        </div>
        <div class="widget-body" id="today-widget-body"></div>
      </div>

      <div class="widget" id="widget-todo" data-col="left">
        <div class="widget-header">
          <span class="widget-drag-handle" title="Taşı"></span>
          <span class="widget-icon" data-icon="check" data-icon-size="15"></span>
          <span class="widget-title">Yapılacaklar</span>
          <button class="widget-expand" id="todo-expand-btn" data-icon="expand" data-icon-size="13"></button>
        </div>
        <div class="widget-body" id="todo-widget-body"></div>
      </div>

      <div class="widget" id="widget-notes" data-col="left">
        <div class="widget-header">
          <span class="widget-drag-handle" title="Taşı"></span>
          <span class="widget-icon" data-icon="note" data-icon-size="15"></span>
          <span class="widget-title">Notlar</span>
          <button class="widget-expand" id="notes-expand-btn" data-icon="expand" data-icon-size="13"></button>
        </div>
        <div class="widget-body" id="notes-widget-body"></div>
      </div>

      <div class="widget" id="widget-habits" data-col="left">
        <div class="widget-header">
          <span class="widget-drag-handle" title="Taşı"></span>
          <span class="widget-icon" data-icon="habit" data-icon-size="15"></span>
          <span class="widget-title">Alışkanlıklar</span>
          <button class="widget-expand" id="habits-expand-btn" data-icon="expand" data-icon-size="13"></button>
        </div>
        <div class="widget-body" id="habits-widget-body"></div>
      </div>

      <div class="widget" id="widget-pomodoro" data-col="left">
        <div class="widget-header">
          <span class="widget-drag-handle" title="Taşı"></span>
          <span class="widget-icon" data-icon="clock" data-icon-size="15"></span>
          <span class="widget-title">Pomodoro</span>
          <button class="widget-expand" id="pomo-expand-btn" data-icon="expand" data-icon-size="13"></button>
        </div>
        <div class="widget-body" id="pomo-widget-body"></div>
      </div>

      <div class="widget" id="widget-test" data-col="left" data-dev="true">
        <div class="widget-header">
          <span class="widget-drag-handle" title="Taşı"></span>
          <span class="widget-icon" data-icon="settings" data-icon-size="15"></span>
          <span class="widget-title">Test</span>
          <button class="widget-expand" id="test-expand-btn" data-icon="expand" data-icon-size="13"></button>
        </div>
        <div class="widget-body" id="test-widget-body"></div>
      </div>

    </aside>

    <!-- Orta Panel -->
    <main id="col-center"></main>

    <!-- Sağ Sütun -->
    <aside class="column" id="col-right">

      <div class="widget" id="widget-calendar" data-col="right">
        <div class="widget-header">
          <span class="widget-drag-handle" title="Taşı"></span>
          <span class="widget-icon" data-icon="calendar" data-icon-size="15"></span>
          <span class="widget-title">Takvim</span>
          <button class="widget-expand" id="calendar-expand-btn" data-icon="expand" data-icon-size="13"></button>
        </div>
        <div class="widget-body" id="calendar-widget-body"></div>
      </div>

      <div class="widget" id="widget-projects" data-col="right">
        <div class="widget-header">
          <span class="widget-drag-handle" title="Taşı"></span>
          <span class="widget-icon" data-icon="folder" data-icon-size="15"></span>
          <span class="widget-title">Projeler</span>
          <button class="widget-expand" id="projects-expand-btn" data-icon="expand" data-icon-size="13"></button>
        </div>
        <div class="widget-body" id="projects-widget-body"></div>
      </div>

      <div class="widget" id="widget-focus" data-col="right">
        <div class="widget-header">
          <span class="widget-drag-handle" title="Taşı"></span>
          <span class="widget-icon" data-icon="music" data-icon-size="15"></span>
          <span class="widget-title">Odak Sesi</span>
          <button class="widget-expand" id="focus-expand-btn" data-icon="expand" data-icon-size="13"></button>
        </div>
        <div class="widget-body" id="focus-widget-body"></div>
      </div>

    </aside>

  </div>

</div>

<script src="js/core.js"></script>
<script src="js/icons.js"></script>
<script src="js/datepicker.js"></script>
<script src="js/modules/pomodoro.js"></script>
<script src="js/modules/todo.js"></script>
<script src="js/modules/projects.js"></script>
<script src="js/modules/calendar.js"></script>
<script src="js/modules/today.js"></script>
<script src="js/modules/notes.js"></script>
<script src="js/modules/focus.js"></script>
<script src="js/modules/habits.js"></script>
<script src="js/modules/settings.js"></script>
<script src="js/modules/test.js"></script>
<script src="js/dashboard.js"></script>
</body>
</html>
